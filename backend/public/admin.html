<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Taste of Moldova</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 flex justify-between h-16 items-center">
            <span class="text-2xl font-bold text-red-700"><i class="fas fa-wine-glass-alt mr-2"></i>Taste of Moldova
                <span class="text-xs bg-red-50 px-2 py-1 rounded-full uppercase">Admin</span></span>
            <button onclick="logout()" class="text-gray-500 hover:text-red-700"><i class="fas fa-sign-out-alt"></i>
                Ieșire</button>
        </div>
    </nav>

    <div id="login-screen"
        class="max-w-md mx-auto mt-20 p-8 bg-white rounded-3xl shadow-xl border border-gray-100 text-center">
        <h2 class="text-2xl font-bold mb-6">Autentificare</h2>
        <input type="password" id="password" placeholder="Parolă"
            class="w-full px-4 py-3 border rounded-xl mb-4 outline-none focus:ring-2 focus:ring-red-500">
        <button onclick="login()"
            class="w-full bg-red-700 text-white font-bold py-3 rounded-xl shadow-lg hover:bg-red-800 transition">Login</button>
    </div>

    <div id="dashboard" class="max-w-7xl mx-auto px-4 py-10 hidden">
        <div id="notification"
            class="fixed top-20 right-8 px-6 py-3 bg-green-600 text-white font-bold rounded-xl shadow-2xl transform translate-x-80 transition-transform duration-300 z-50">
            Success!</div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
                <h2 class="text-xl font-bold mb-6 text-red-700"><i class="fas fa-plus mr-2"></i>Vinărie</h2>
                <form id="winery-form" onsubmit="event.preventDefault(); addWinery();" class="space-y-4">
                    <input type="text" id="w-name" placeholder="Nume Vinărie" required
                        class="w-full px-4 py-2 bg-gray-50 border rounded-xl outline-none">
                    <textarea id="w-desc" placeholder="Descriere" required
                        class="w-full px-4 py-2 bg-gray-50 border rounded-xl h-24 outline-none"></textarea>
                    <input type="text" id="w-image" placeholder="URL Imagine"
                        class="w-full px-4 py-2 bg-gray-50 border rounded-xl outline-none">
                    <button type="submit"
                        class="w-full bg-red-700 text-white font-bold py-3 rounded-xl hover:bg-red-800 transition">Salvează
                        Vinăria</button>
                </form>
            </div>

            <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
                <h2 class="text-xl font-bold mb-6 text-blue-700"><i class="fas fa-calendar-plus mr-2"></i>Eveniment</h2>
                <form id="event-form" onsubmit="event.preventDefault(); addEvent();" class="space-y-4">
                    <input type="text" id="e-title" placeholder="Titlu Eveniment" required
                        class="w-full px-4 py-2 bg-gray-50 border rounded-xl outline-none">
                    <input type="date" id="e-date" required
                        class="w-full px-4 py-2 bg-gray-50 border rounded-xl outline-none">
                    <input type="text" id="e-location" placeholder="Locație"
                        class="w-full px-4 py-2 bg-gray-50 border rounded-xl outline-none">
                    <button type="submit"
                        class="w-full bg-blue-700 text-white font-bold py-3 rounded-xl hover:bg-blue-800 transition">Salvează
                        Evenimentul</button>
                </form>
            </div>

            <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 lg:col-span-2">
                <h2 class="text-xl font-bold mb-6 text-orange-600"><i class="fas fa-file-alt mr-2"></i>Articol Nou</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="art-title" class="px-4 py-2 bg-gray-50 border rounded-xl outline-none"
                        placeholder="Titlu Articol">
                    <input type="text" id="art-subtitle" class="px-4 py-2 bg-gray-50 border rounded-xl outline-none"
                        placeholder="Subtitlu">
                    <input type="text" id="art-image"
                        class="px-4 py-2 bg-gray-50 border rounded-xl outline-none md:col-span-2"
                        placeholder="URL Imagine">
                    <textarea id="art-content"
                        class="px-4 py-2 bg-gray-50 border rounded-xl h-32 outline-none md:col-span-2"
                        placeholder="Conținutul articolului..."></textarea>
                    <button onclick="publishArticle()"
                        class="md:col-span-2 bg-orange-600 text-white font-bold py-3 rounded-xl hover:bg-orange-700 transition">Publică
                        Articolul</button>
                </div>
            </div>
        </div>

        <div class="space-y-8">
            <h3 class="text-2xl font-bold">Gestiune Date</h3>
            <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="px-6 py-4">Denumire</th>
                            <th class="px-6 py-4 text-right">Acțiuni</th>
                        </tr>
                    </thead>
                    <tbody id="data-table-body" class="divide-y"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let adminPassword = "";
        let editingId = null;

        function login() {
            const pass = document.getElementById('password').value;
            if (pass === "Moldova2026") {
                adminPassword = pass;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadData();
            } else { alert("Parolă Incorectă!"); }
        }

        function logout() { location.reload(); }

        function showNotification(msg) {
            const el = document.getElementById('notification');
            el.innerText = msg; el.classList.remove('translate-x-80');
            setTimeout(() => el.classList.add('translate-x-80'), 3000);
        }

        async function loadData() {
            const [wRes, eRes] = await Promise.all([fetch('/api/wineries'), fetch('/api/events')]);
            const wineries = await wRes.json();
            const events = await eRes.json();

            const body = document.getElementById('data-table-body');
            body.innerHTML = [
                ...wineries.map(item => ({ ...item, type: 'winery', label: item.name })),
                ...events.map(item => ({ ...item, type: 'event', label: item.title }))
            ].map(item => `
                <tr>
                    <td class="px-6 py-4 font-medium">${item.label} <span class="text-xs text-gray-400 ml-2">(${item.type})</span></td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="prepareEdit('${item.type}', '${item.id}')" class="text-blue-600 p-2"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteItem('${item.type}', '${item.id}')" class="text-red-500 p-2"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        async function prepareEdit(type, id) {
            editingId = id; window.scrollTo({ top: 0, behavior: 'smooth' });
            const items = await (await fetch(type === 'winery' ? '/api/wineries' : '/api/events')).json();
            const item = items.find(i => i.id == id);
            if (item) {
                if (type === 'winery') {
                    document.getElementById('w-name').value = item.name;
                    document.getElementById('w-desc').value = item.description;
                    document.getElementById('w-image').value = item.imageUrl || "";
                    document.querySelector('#winery-form button').innerText = "Actualizează Vinăria";
                } else {
                    document.getElementById('e-title').value = item.title;
                    if (item.date) document.getElementById('e-date').value = item.date.split('T')[0];
                    document.querySelector('#event-form button').innerText = "Actualizează Evenimentul";
                }
                showNotification("Editare activată!");
            }
        }

        async function addWinery() {
            const data = { name: document.getElementById('w-name').value, description: document.getElementById('w-desc').value, imageUrl: document.getElementById('w-image').value, password: adminPassword };
            const url = editingId ? `/api/winery/${editingId}` : '/api/admin/winery';
            const res = await fetch(url, { method: editingId ? 'PUT' : 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            if (res.ok) {
                showNotification("Succes!"); editingId = null; document.getElementById('winery-form').reset();
                document.querySelector('#winery-form button').innerText = "Salvează Vinăria"; loadData();
            }
        }

        async function addEvent() {
            const rawDate = document.getElementById('e-date').value;
            const data = { title: document.getElementById('e-title').value, date: new Date(rawDate).toISOString(), displayDate: new Date(rawDate).toLocaleDateString('ro-RO', { day: 'numeric', month: 'long', year: 'numeric' }), password: adminPassword };
            const url = editingId ? `/api/event/${editingId}` : '/api/admin/event';
            const res = await fetch(url, { method: editingId ? 'PUT' : 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            if (res.ok) { showNotification("Succes!"); editingId = null; document.getElementById('event-form').reset(); loadData(); }
        }

        async function publishArticle() {
            const data = { title: document.getElementById('art-title').value, subtitle: document.getElementById('art-subtitle').value, content: document.getElementById('art-content').value, imageURL: document.getElementById('art-image').value, password: adminPassword };
            const res = await fetch('/api/articles', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            if (res.ok) { showNotification("Articol Publicat!"); location.reload(); }
        }

        async function deleteItem(type, id) {
            if (!confirm("Ștergi?")) return;
            const res = await fetch(`/api/admin/${type}/${id}`, { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: adminPassword }) });
            if (res.ok) loadData();
        }
    </script>
</body>

</html>
